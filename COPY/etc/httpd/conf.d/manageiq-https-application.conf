## ManageIQ SSL Virtual Host Context

<VirtualHost *:443>
KeepAlive on

DocumentRoot /var/www/miq/vmdb/public

# The following redirects files must be included to
# handle most specific to least specific URLs.
Include conf.d/manageiq-redirects-api
Include conf.d/manageiq-redirects-ui
Include conf.d/manageiq-redirects-websocket
Include conf.d/manageiq-host-config
RequestHeader set X_FORWARDED_PROTO 'https'
Header always set Strict-Transport-Security "max-age=631138519"
Header always set X-Content-Type-Options "nosniff"

ErrorLog /var/www/miq/vmdb/log/apache/ssl_error.log
TransferLog /var/www/miq/vmdb/log/apache/ssl_access.log
LogLevel warn

SSLEngine on
SSLProtocol all -SSLv2 -SSLv3 -TLSv1 -TLSv1.1
SSLCertificateFile /var/www/miq/vmdb/certs/server.cer
SSLCertificateKeyFile /var/www/miq/vmdb/certs/server.cer.key

<LocationMatch "^/(assets|packs)/">
  Header unset ETag
  # Explicit HSTS needed: Location blocks using "Header set" don't inherit "Header always set" from VirtualHost
  Header always set Strict-Transport-Security   "max-age=631138519"
  # CSP for static assets: strict policy since these are pre-compiled external files
  # No unsafe-inline needed - all scripts/styles are external resources
  Header set Content-Security-Policy            "default-src 'self'; base-uri 'self'; child-src 'self'; form-action 'self'; frame-ancestors 'self'; frame-src 'self'; worker-src 'self'; font-src 'self' fonts.gstatic.com fonts.googleapis.com; img-src 'self' data:; style-src 'self' fonts.googleapis.com fonts.gstatic.com; report-uri /dashboard/csp_report; report-to csp-endpoint"
  Header set Report-To                          "{\"group\":\"csp-endpoint\",\"max_age\":10886400,\"endpoints\":[{\"url\":\"/dashboard/csp_report\"}]}"
  Header set X-Content-Type-Options             "nosniff"
  Header set X-Frame-Options                    "SAMEORIGIN"
  Header set X-Permitted-Cross-Domain-Policies  "none"
  Header set X-XSS-Protection                   "1; mode=block"
  FileETag None
  Header merge Cache-Control public
  ExpiresActive On
  ExpiresDefault "access plus 1 year"
</LocationMatch>

<Files ~ "\.(cgi|shtml|phtml|php3?)$">
  SSLOptions +StdEnvVars
</Files>
<Directory "/var/www/cgi-bin">
  SSLOptions +StdEnvVars
</Directory>

<Location /proxy_pages/>
  ErrorDocument 403 /error/noindex.html
  ErrorDocument 404 /error/noindex.html
</Location>

SetEnvIf User-Agent ".*MSIE.*" \
         nokeepalive ssl-unclean-shutdown \
         downgrade-1.0 force-response-1.0

CustomLog /var/www/miq/vmdb/log/apache/ssl_request.log \
          "%t %h %{SSL_PROTOCOL}x %{SSL_CIPHER}x \"%r\" %b"

</VirtualHost>
